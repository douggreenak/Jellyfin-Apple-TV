# ─────────────────────────────────────────────────────────────────────────────
# nginx site for the Jellyfin admin.
#   • Serves the React single-page app on port 80.
#   • Reverse-proxies /api/  ->  http://server:4000  (the Node backend service).
#
# Because the API is proxied here, the SAME url that serves the dashboard also
# serves the device API:
#     dashboard   : http://<box>:8080/
#     device API  : http://<box>:8080/api/v1/...   (proxied to server:4000)
#     (the backend is also reachable directly on the box at :4000)
#
# "server" is the docker-compose service name for the backend; Docker's internal
# DNS resolves it on the shared network.
# ─────────────────────────────────────────────────────────────────────────────

upstream jellyfin_api {
    server server:4000;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Don't cap upload size for config pushes / Jellyfin test payloads.
    client_max_body_size 10m;

    # Light gzip for the JS/CSS bundle.
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- Device + admin API -> Node backend --------------------------------
    # Keep the /api prefix intact: the backend mounts routes under /api/v1,
    # so /api/v1/devices/... must arrive at the backend unchanged.
    location /api/ {
        proxy_pass         http://jellyfin_api;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass device auth headers through untouched.
        proxy_set_header   X-Unit-Id     $http_x_unit_id;
        proxy_set_header   X-Unit-Token  $http_x_unit_token;

        # Heartbeats are tiny but frequent; give the upstream a little room.
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_buffering       off;
    }

    # --- Static SPA --------------------------------------------------------
    # Hashed assets can be cached hard.
    location /assets/ {
        try_files $uri =404;
        expires    30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else falls through to index.html so client-side routing works
    # (deep links like /units/<id> reload correctly).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML shell, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
